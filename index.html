<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한글 글자 단위 분리기</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
  label { display: block; font-weight: bold; margin: 16px 0 6px; }
  textarea { width: 100%; box-sizing: border-box; padding: 8px; font-family: monospace; font-size: 14px; min-height: 120px; }
  #output { white-space: pre-wrap; word-break: break-all; border: 1px solid #ccc; padding: 12px; margin-top: 8px; min-height: 60px; font-family: monospace; }
  .result-header { display: flex; align-items: center; justify-content: space-between; }
  #copyBtn { font-size: 13px; padding: 6px 12px; cursor: pointer; border: 1px solid #888; border-radius: 4px; background: #f5f5f5; }
  #copyBtn:disabled { opacity: 0.5; cursor: default; }
  .error { color: #c00; }
</style>
</head>
<body>
  <h1>한글 글자 단위 분리기</h1>

  <label for="text">텍스트 입력</label>
  <textarea id="text"></textarea>

  <div class="result-header">
    <label>결과</label>
    <button id="copyBtn">복사</button>
  </div>
  <div id="output"></div>

<script>
  const $ = id => document.getElementById(id);
  const HANGUL = /[가-힣]/;
  let resultText = '';

  function run() {
    const out = $('output'), btn = $('copyBtn');
    const text = $('text').value;

    resultText = text.replace(/([가-힣])/g, '$1 ');
    out.textContent = resultText;
    btn.disabled = resultText.length === 0;
  }

  async function copy() {
    const btn = $('copyBtn');
    try {
      await navigator.clipboard.writeText(resultText);
    } catch {
      // 클립보드 API가 막힌 환경 대비 폴백
      const ta = document.createElement('textarea');
      ta.value = resultText;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    btn.textContent = '복사됨';
    setTimeout(() => { btn.textContent = '복사'; }, 1500);
  }

  $('text').addEventListener('input', run);
  $('copyBtn').addEventListener('click', copy);
  run();
</script>
</body>
</html>
