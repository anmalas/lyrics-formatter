<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJK 글자 단위 분리기</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%234263eb'/%3E%3Crect x='8' y='16' width='22' height='32' rx='4' fill='none' stroke='white' stroke-width='3'/%3E%3Crect x='34' y='16' width='22' height='32' rx='4' fill='none' stroke='white' stroke-width='3' stroke-dasharray='4 3'/%3E%3Ctext x='19' y='40' font-size='18' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'%3E글%3C/text%3E%3C/svg%3E">
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
  label { display: block; font-weight: bold; margin: 16px 0 6px; }
  textarea { width: 100%; box-sizing: border-box; padding: 8px; font-family: monospace; font-size: 14px; min-height: 120px; }
  #output { white-space: pre-wrap; word-break: break-all; border: 1px solid #ccc; padding: 12px; margin-top: 8px; min-height: 60px; font-family: monospace; }
  .result-header { display: flex; align-items: center; justify-content: space-between; }
  #copyBtn { font-size: 13px; padding: 6px 12px; cursor: pointer; border: 1px solid #888; border-radius: 4px; background: #f5f5f5; }
  #copyBtn:disabled { opacity: 0.5; cursor: default; }
  .error { color: #c00; }
</style>
</head>
<body>
  <h1>CJK 글자 단위 분리기</h1>

  <label for="text">입력 텍스트 (한국어 / 중국어 / 일본어)</label>
  <textarea id="text">안녕하세요 你好 こんにちは</textarea>

  <div class="result-header">
    <label>결과</label>
    <button id="copyBtn">복사</button>
  </div>
  <div id="output"></div>

<script>
  const $ = id => document.getElementById(id);

  // CJK 글자 범위:
  //   한글 음절          가-힣
  //   한글 자모          ㄱ-ㅎㅏ-ㅣ
  //   히라가나           \u3040-\u309F
  //   가타카나           \u30A0-\u30FF
  //   CJK 한자 (간체/번체 공통)  \u4E00-\u9FFF
  //   CJK 확장 A         \u3400-\u4DBF
  //   호환 한자          \uF900-\uFAFF
  const CJK_CLASS = '가-힣ㄱ-ㅎㅏ-ㅣ\\u3040-\\u309F\\u30A0-\\u30FF\\u4E00-\\u9FFF\\u3400-\\u4DBF\\uF900-\\uFAFF';
  const SPLIT_RE = new RegExp('([' + CJK_CLASS + '])', 'g');
  const HAS_CJK = new RegExp('[' + CJK_CLASS + ']');

  let resultText = '';

  function run() {
    const out = $('output'), btn = $('copyBtn');
    const text = $('text').value;

    if (text && !HAS_CJK.test(text)) {
      out.innerHTML = '<span class="error">한국어·중국어·일본어 글자가 포함된 텍스트를 입력하세요.</span>';
      resultText = '';
      btn.disabled = true;
      return;
    }

    resultText = text.replace(SPLIT_RE, '$1 ');
    out.textContent = resultText;
    btn.disabled = resultText.length === 0;
  }

  async function copy() {
    const btn = $('copyBtn');
    try {
      await navigator.clipboard.writeText(resultText);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = resultText;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    btn.textContent = '복사됨';
    setTimeout(() => { btn.textContent = '복사'; }, 1500);
  }

  $('text').addEventListener('input', run);
  $('copyBtn').addEventListener('click', copy);
  run();
</script>
</body>
</html>
